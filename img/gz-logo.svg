<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#06080a"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b44aff"/>
      <stop offset="50%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#00ff41"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b44aff"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="106" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.25"/>
  <!-- Network lines -->
  <g opacity="0.3" stroke-width="1.5">
    <line x1="96" y1="112" x2="192" y2="192" stroke="#b44aff"/>
    <line x1="416" y1="112" x2="320" y2="192" stroke="#00d4ff"/>
    <line x1="96" y1="400" x2="192" y2="320" stroke="#00ff41"/>
    <line x1="416" y1="400" x2="320" y2="320" stroke="#b44aff"/>
    <line x1="64" y1="256" x2="168" y2="256" stroke="#9933ff" opacity="0.5"/>
    <line x1="448" y1="256" x2="344" y2="256" stroke="#00cc33" opacity="0.5"/>
    <line x1="256" y1="72" x2="256" y2="176" stroke="#00d4ff" opacity="0.5"/>
    <line x1="256" y1="440" x2="256" y2="336" stroke="#9933ff" opacity="0.5"/>
  </g>
  <!-- Nodes -->
  <circle cx="96" cy="112" r="6" fill="#b44aff" opacity="0.6"/>
  <circle cx="416" cy="112" r="6" fill="#00d4ff" opacity="0.6"/>
  <circle cx="96" cy="400" r="5" fill="#00ff41" opacity="0.4"/>
  <circle cx="416" cy="400" r="5" fill="#b44aff" opacity="0.4"/>
  <circle cx="64" cy="256" r="4" fill="#9933ff" opacity="0.3"/>
  <circle cx="448" cy="256" r="4" fill="#00cc33" opacity="0.3"/>
  <circle cx="256" cy="72" r="4" fill="#00d4ff" opacity="0.3"/>
  <circle cx="256" cy="440" r="4" fill="#9933ff" opacity="0.3"/>
  <!-- Binary rain -->
  <text x="80" y="84" font-family="monospace" font-size="18" fill="#b44aff" opacity="0.15">01</text>
  <text x="400" y="88" font-family="monospace" font-size="16" fill="#00d4ff" opacity="0.12">10</text>
  <text x="72" y="300" font-family="monospace" font-size="14" fill="#00ff41" opacity="0.10">11</text>
  <text x="408" y="308" font-family="monospace" font-size="16" fill="#b44aff" opacity="0.10">00</text>
  <!-- Core rect -->
  <rect x="144" y="176" width="224" height="160" rx="28" fill="rgba(180,74,255,0.04)" stroke="url(#g1)" stroke-width="3" filter="url(#glow)"/>
  <!-- Terminal cursor line -->
  <rect x="176" y="308" width="160" height="4" rx="2" fill="url(#g2)" opacity="0.2"/>
  <!-- AI text -->
  <text x="256" y="268" text-anchor="middle" dominant-baseline="central" font-family="monospace" font-size="96" font-weight="700" fill="url(#g1)" letter-spacing="16" filter="url(#glow-strong)">AI</text>
</svg>
